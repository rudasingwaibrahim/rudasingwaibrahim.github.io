- slug: thales
  nom: "Thalès"
  dates: "v. 625 – v. 547 av. J.-C."
  image: "/assets/images/matheux/thales.jpg"
  resume: "Savant grec de l’Antiquité, souvent considéré comme l’un des premiers mathématiciens de l’histoire."
  apport: "Son nom est associé au théorème de Thalès, fondamental dans l’étude des proportions et de la géométrie."
  citation: "Le plus difficile dans la vie, c’est de se connaître soi-même."

- slug: pythagore
  nom: "Pythagore"
  dates: "v. 580 – v. 495 av. J.-C."
  image: "/assets/images/matheux/pythagore.jpg"
  resume: "Philosophe et mathématicien grec, fondateur d’une école de pensée où les nombres occupaient une place centrale."
  apport: "Son nom reste attaché au théorème de Pythagore sur les triangles rectangles."
  citation: "Tout est nombre."

- slug: euclide
  nom: "Euclide"
  dates: "v. 325 – v. 265 av. J.-C."
  image: "/assets/images/matheux/euclide.jpg"
  resume: "Mathématicien grec de l’Antiquité, auteur des Éléments, l’un des ouvrages les plus influents de l’histoire des sciences."
  apport: "Il a structuré la géométrie en un système déductif fondé sur des définitions, axiomes et théorèmes."
  citation: "Il n’existe pas de voie royale vers la géométrie."

- slug: archimede
  nom: "Archimède"
  dates: "v. 287 – v. 212 av. J.-C."
  image: "/assets/images/matheux/archimede.jpg"
  resume: "Savant grec, à la fois mathématicien, physicien et ingénieur, célèbre pour la profondeur de ses découvertes."
  apport: "Il a travaillé sur les aires, les volumes, les centres de gravité et des méthodes qui annoncent le calcul intégral."
  citation: "Donnez-moi un point d’appui, et je soulèverai le monde."

- slug: hypatie
  nom: "Hypatie d’Alexandrie"
  dates: "v. 370 – 415"
  image: "/assets/images/matheux/hypatie.jpg"
  resume: "Mathématicienne, astronome et philosophe de l’Antiquité tardive, figure majeure du savoir à Alexandrie."
  apport: "Elle a contribué à la transmission et au commentaire des mathématiques grecques."
  citation: "Défends ton droit de penser."

- slug: al-khawarizmi
  nom: "Al-Khwarizmi"
  dates: "v. 780 – v. 850"
  image: "/assets/images/matheux/al-khawarizmi.jpg"
  resume: "Mathématicien persan du monde médiéval islamique, l’un des grands fondateurs de l’algèbre."
  apport: "Son nom a donné le mot algorithme, et ses travaux ont joué un rôle central dans la diffusion du calcul."
  citation: "La science progresse par l’ordre, la méthode et la clarté."

- slug: fibonacci
  nom: "Fibonacci"
  dates: "v. 1170 – v. 1240"
  image: "/assets/images/matheux/fibonacci.jpg"
  resume: "Mathématicien italien du Moyen Âge, connu pour avoir largement diffusé les chiffres indo-arabes en Europe."
  apport: "Son nom est associé à la suite de Fibonacci, célèbre en arithmétique et dans de nombreux modèles naturels."
  citation: "La pratique du calcul ouvre la voie à la compréhension."

- slug: descartes
  nom: "René Descartes"
  dates: "1596 – 1650"
  image: "/assets/images/matheux/descartes.jpg"
  resume: "Philosophe, savant et mathématicien français, il a joué un rôle essentiel dans la naissance de la pensée moderne."
  apport: "Il a fondé la géométrie analytique, reliant algèbre et géométrie."
  citation: "Pour atteindre la vérité, il faut une fois dans sa vie se défaire de toutes les opinions reçues."

- slug: fermat
  nom: "Pierre de Fermat"
  dates: "1607 – 1665"
  image: "/assets/images/matheux/fermat.jpg"
  resume: "Magistrat et mathématicien français, il a profondément marqué la théorie des nombres et la géométrie analytique."
  apport: "Il est célèbre pour le dernier théorème de Fermat et pour ses idées sur les tangentes, maxima et minima."
  citation: "Je tiens une merveilleuse démonstration, mais cette marge est trop étroite pour la contenir."

- slug: pascal
  nom: "Blaise Pascal"
  dates: "1623 – 1662"
  image: "/assets/images/matheux/pascal.jpg"
  resume: "Mathématicien, physicien et philosophe français, il a été l’un des grands esprits du XVIIe siècle."
  apport: "Il a contribué aux probabilités, à la géométrie projective et a popularisé le triangle qui porte son nom."
  citation: "Le cœur a ses raisons que la raison ne connaît point."

- slug: newton
  nom: "Isaac Newton"
  dates: "1643 – 1727"
  image: "/assets/images/matheux/newton.jpg"
  resume: "Physicien et mathématicien anglais, figure majeure de la révolution scientifique."
  apport: "Il a développé, avec Leibniz, le calcul infinitésimal et a transformé les sciences exactes."
  citation: "Si j’ai vu plus loin, c’est en me tenant sur les épaules de géants."

- slug: leibniz
  nom: "Gottfried Wilhelm Leibniz"
  dates: "1646 – 1716"
  image: "/assets/images/matheux/leibniz.jpg"
  resume: "Philosophe et mathématicien allemand, co-inventeur du calcul différentiel et intégral."
  apport: "Il a introduit des notations très fécondes, dont celles de la dérivation et de l’intégration."
  citation: "La musique est un exercice d’arithmétique secret de l’âme."

- slug: bernoulli
  nom: "Jacob Bernoulli"
  dates: "1655 – 1705"
  image: "/assets/images/matheux/bernoulli.jpg"
  resume: "Mathématicien suisse, membre d’une famille qui a profondément influencé les mathématiques européennes."
  apport: "Il a contribué aux probabilités et à l’étude des suites et séries."
  citation: "Même après tant de tours, je renaîtrai le même."

- slug: euler
  nom: "Leonhard Euler"
  dates: "1707 – 1783"
  image: "/assets/images/matheux/euler.jpg"
  resume: "Mathématicien suisse extraordinairement prolifique, il a travaillé dans presque tous les domaines des mathématiques."
  apport: "Il a popularisé de nombreuses notations modernes et enrichi l’analyse, l’algèbre, la théorie des nombres et les graphes."
  citation: "Rien ne se passe dans le monde qui ne signifie quelque chose."

- slug: lagrange
  nom: "Joseph-Louis Lagrange"
  dates: "1736 – 1813"
  image: "/assets/images/matheux/lagrange.jpg"
  resume: "Mathématicien et mécanicien, né à Turin, il a été l’un des grands savants du XVIIIe siècle."
  apport: "Il a apporté des contributions décisives à l’analyse, à l’algèbre et à la mécanique analytique."
  citation: "Tant que l’algèbre et la géométrie avanceront séparément, leurs progrès seront lents."

- slug: laplace
  nom: "Pierre-Simon de Laplace"
  dates: "1749 – 1827"
  image: "/assets/images/matheux/laplace.jpg"
  resume: "Mathématicien, astronome et physicien français, il a dominé une grande partie des sciences mathématiques de son temps."
  apport: "Il a joué un rôle fondamental en probabilités, en analyse et en mécanique céleste."
  citation: "Ce que nous connaissons est peu de chose ; ce que nous ignorons est immense."

- slug: legendre
  nom: "Adrien-Marie Legendre"
  dates: "1752 – 1833"
  image: "/assets/images/matheux/legendre.jpg"
  resume: "Mathématicien français connu pour ses travaux en géométrie, analyse et théorie des nombres."
  apport: "Son nom reste attaché aux polynômes de Legendre et à des résultats importants en arithmétique."
  citation: "La clarté est la politesse des sciences."

- slug: gauss
  nom: "Carl Friedrich Gauss"
  dates: "1777 – 1855"
  image: "/assets/images/matheux/gauss.jpg"
  resume: "Mathématicien allemand souvent surnommé le prince des mathématiciens."
  apport: "Il a profondément marqué l’arithmétique, la géométrie, les probabilités et l’astronomie."
  citation: "Les mathématiques sont la reine des sciences."

- slug: fourier
  nom: "Joseph Fourier"
  dates: "1768 – 1830"
  image: "/assets/images/matheux/fourier.jpg"
  resume: "Mathématicien et physicien français, célèbre pour ses travaux sur la chaleur et l’analyse."
  apport: "Les séries de Fourier sont devenues un outil fondamental dans de nombreuses branches des sciences."
  citation: "L’étude approfondie de la nature est la source la plus féconde des découvertes mathématiques."

- slug: cauchy
  nom: "Augustin-Louis Cauchy"
  dates: "1789 – 1857"
  image: "/assets/images/matheux/cauchy.jpg"
  resume: "Mathématicien français qui a donné une rigueur nouvelle à l’analyse."
  apport: "Il a clarifié la notion de limite, les séries, les fonctions et de nombreux fondements de l’analyse moderne."
  citation: "La rigueur est l’âme des mathématiques."

- slug: abel
  nom: "Niels Henrik Abel"
  dates: "1802 – 1829"
  image: "/assets/images/matheux/abel.jpg"
  resume: "Mathématicien norvégien au génie exceptionnel, mort très jeune."
  apport: "Il a montré l’impossibilité générale de résoudre par radicaux les équations polynomiales de degré cinq."
  citation: "Étudier les mathématiques, c’est chercher l’impossible avec méthode."

- slug: galois
  nom: "Évariste Galois"
  dates: "1811 – 1832"
  image: "/assets/images/matheux/galois.jpg"
  resume: "Mathématicien français au destin tragique, mort à vingt ans après avoir révolutionné l’algèbre."
  apport: "Il a fondé la théorie des groupes appliquée à la résolution des équations."
  citation: "Je n’ai pas le temps."

- slug: boole
  nom: "George Boole"
  dates: "1815 – 1864"
  image: "/assets/images/matheux/boole.jpg"
  resume: "Mathématicien britannique dont les travaux ont influencé la logique et l’informatique moderne."
  apport: "L’algèbre de Boole est à la base des circuits logiques et du raisonnement binaire."
  citation: "Aucune méthode générale n’existe sans langage clair."

- slug: riemann
  nom: "Bernhard Riemann"
  dates: "1826 – 1866"
  image: "/assets/images/matheux/riemann.jpg"
  resume: "Mathématicien allemand dont l’œuvre a profondément influencé l’analyse, la géométrie et la théorie des nombres."
  apport: "Il a renouvelé la géométrie et laissé une conjecture centrale sur la répartition des nombres premiers."
  citation: "Si seulement je pouvais démontrer mes théorèmes avec autant de certitude que je les pressens."

- slug: weierstrass
  nom: "Karl Weierstrass"
  dates: "1815 – 1897"
  image: "/assets/images/matheux/weierstrass.jpg"
  resume: "Mathématicien allemand, figure majeure de la rigueur en analyse."
  apport: "Il a contribué à formaliser la définition moderne de la limite et de la continuité."
  citation: "La précision est la première forme du respect pour la vérité."

- slug: cantоr
  nom: "Georg Cantor"
  dates: "1845 – 1918"
  image: "/assets/images/matheux/cantor.jpg"
  resume: "Mathématicien germano-russe, fondateur de la théorie des ensembles."
  apport: "Il a montré qu’il existe plusieurs tailles d’infini, transformant radicalement les mathématiques."
  citation: "L’essence des mathématiques réside précisément dans leur liberté."

- slug: poincare
  nom: "Henri Poincaré"
  dates: "1854 – 1912"
  image: "/assets/images/matheux/poincare.jpg"
  resume: "Mathématicien, physicien et philosophe français, l’un des plus grands savants de son époque."
  apport: "Il a joué un rôle fondamental en topologie, en analyse et en mécanique céleste."
  citation: "La pensée n’est qu’un éclair au milieu d’une longue nuit."

- slug: hilbert
  nom: "David Hilbert"
  dates: "1862 – 1943"
  image: "/assets/images/matheux/hilbert.jpg"
  resume: "Mathématicien allemand qui a profondément influencé l’algèbre, la géométrie et les fondements des mathématiques."
  apport: "Ses célèbres problèmes ont orienté une grande partie de la recherche mathématique du XXe siècle."
  citation: "Nous devons savoir. Nous saurons."

- slug: hardy
  nom: "G. H. Hardy"
  dates: "1877 – 1947"
  image: "/assets/images/matheux/hardy.jpg"
  resume: "Mathématicien britannique connu pour ses travaux en analyse et théorie des nombres."
  apport: "Il a aussi joué un rôle décisif dans la reconnaissance du génie de Ramanujan."
  citation: "Un mathématicien, comme un peintre ou un poète, est un créateur de formes."

- slug: ramanujan
  nom: "Srinivasa Ramanujan"
  dates: "1887 – 1920"
  image: "/assets/images/matheux/ramanujan.jpg"
  resume: "Mathématicien indien autodidacte, célèbre pour la richesse extraordinaire de son intuition."
  apport: "Il a produit des résultats remarquables sur les séries, les partitions, les fractions continues et les nombres."
  citation: "Une équation n’a pour moi aucun sens si elle n’exprime pas une pensée de Dieu."

- slug: noether
  nom: "Emmy Noether"
  dates: "1882 – 1935"
  image: "/assets/images/matheux/noether.jpg"
  resume: "Mathématicienne allemande majeure du XXe siècle, elle a révolutionné l’algèbre et la physique mathématique."
  apport: "Son théorème relie symétries et lois de conservation."
  citation: "Mes méthodes sont en réalité des méthodes de travail et de pensée."

- slug: banach
  nom: "Stefan Banach"
  dates: "1892 – 1945"
  image: "/assets/images/matheux/banach.jpg"
  resume: "Mathématicien polonais, l’un des fondateurs de l’analyse fonctionnelle moderne."
  apport: "Les espaces de Banach sont devenus des objets fondamentaux de l’analyse."
  citation: "Les mathématiques sont la plus belle et la plus puissante création de l’esprit humain."

- slug: grothendieck
  nom: "Alexandre Grothendieck"
  dates: "1928 – 2014"
  image: "/assets/images/matheux/grothendieck.jpg"
  resume: "Mathématicien français d’origine allemande, figure majeure des mathématiques du XXe siècle."
  apport: "Il a profondément transformé la géométrie algébrique par des concepts d’une grande généralité."
  citation: "Comprendre, c’est voir profondément et simplement."

- slug: serre
  nom: "Jean-Pierre Serre"
  dates: "1926 – 2023"
  image: "/assets/images/matheux/serre.jpg"
  resume: "Mathématicien français parmi les plus influents du XXe et du XXIe siècle."
  apport: "Il a contribué à l’algèbre, à la géométrie, à la topologie et à la théorie des nombres."
  citation: "La simplicité est souvent le signe d’une idée profonde."
