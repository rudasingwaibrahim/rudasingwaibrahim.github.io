<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}
      {{ page.title }} – {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta name="description" content="{{ site.description }}">

  <link rel="stylesheet" href="/assets/css/style.css">
</head>

 <script>
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll('a[href]').forEach(function (link) {
    const href = link.getAttribute('href') || '';
    if (href.toLowerCase().includes('.pdf')) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    }
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggle = document.querySelector(".dropdown-toggle");
  const menu = document.querySelector(".dropdown-menu");
  if (!toggle || !menu) return;

  toggle.addEventListener("click", function (e) {
    e.preventDefault();
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
  });

  document.addEventListener("click", function (e) {
    if (!e.target.closest(".dropdown")) {
      menu.style.display = "none";
    }
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggle = document.querySelector(".dropdown-toggle");
  const menu = document.querySelector(".dropdown-menu");
  if (!toggle || !menu) return;

  toggle.addEventListener("click", function (e) {
    e.preventDefault();
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
  });

  document.addEventListener("click", function (e) {
    if (!e.target.closest(".dropdown")) {
      menu.style.display = "none";
    }
  });
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const toggle = document.querySelector(".dropdown.mega .dropdown-toggle");
  const menu = document.querySelector(".dropdown.mega .dropdown-menu");
  if (!toggle || !menu) return;

  toggle.addEventListener("click", function (e) {
    e.preventDefault();
    const open = menu.style.display === "flex" || menu.style.display === "block";
    menu.style.display = open ? "none" : "flex";
  });

  document.addEventListener("click", function (e) {
    if (!e.target.closest(".dropdown.mega")) {
      menu.style.display = "none";
    }
  });
});
</script>
  
<body>

<header class="hero">
  <div class="hero-overlay">

   <div class="dropdown">
  <a class="nav-item dropdown-toggle" href="#" aria-haspopup="true" aria-expanded="false">
    Classes ▾
  </a>

<div class="dropdown mega">
  <a class="nav-item dropdown-toggle" href="#" aria-haspopup="true" aria-expanded="false">
    Classes ▾
  </a>

 <div class="dropdown mega">

<a class="nav-item dropdown-toggle" href="#">
Classes ▾
</a>

<div class="dropdown-menu mega-menu">

{% for group in site.data.classes %}
<div class="mega-col">

<div class="dropdown-title">
{{ group.level }}
</div>

{% for item in group.items %}
<a class="dropdown-item" href="{{ item.url }}">
{{ item.name }}
</a>
{% endfor %}

</div>
{% endfor %}

</div>
</div>

    <div class="hero-content">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </div>

  </div>
</header>

<main class="container">
  {{ content }}
</main>

<footer class="footer">
  © {{ site.time | date: "%Y" }} — {{ site.title }}
</footer>

</body>
</html>
