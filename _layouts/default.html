<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

  <header class="hero">
    <div class="hero-overlay">

      <div class="topnav">
        <a class="nav-item" href="/">Accueil</a>

        <div class="dropdown">
          <div class="nav-item dropdown-toggle">Classes ▼</div>

          <div class="dropdown-menu mega-menu">
            <div class="mega-col">
              <div class="dropdown-title">Secondes</div>
              <a class="dropdown-item" href="/classes/seconde205/">Seconde 205</a>
              <a class="dropdown-item" href="/classes/seconde219/">Seconde 219</a>
            </div>

            <div class="mega-col">
              <div class="dropdown-title">Lycée</div>
              <a class="dropdown-item" href="/classes/tstmg-t19/">Terminale STMG RH T19</a>
              <a class="dropdown-item" href="/classes/tale-techno-spe/">Tale Techno Spé</a>
            </div>

            <div class="mega-col">
              <div class="dropdown-title">BTS</div>
              <a class="dropdown-item" href="/classes/bts-mec1/">BTS MEC1</a>
            </div>
          </div>
        </div>

        <a class="nav-item" href="/contact/">Contact</a>
      </div>

      <div class="hero-content">
        <h1>{{ page.hero_title | default: site.title }}</h1>
        <p>{{ page.hero_subtitle | default: site.description }}</p>
      </div>

    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="footer">
    © 2026 — {{ site.title }}
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const toggle = document.querySelector(".dropdown-toggle");
      const menu = document.querySelector(".dropdown-menu");

      if (toggle && menu) {
        toggle.addEventListener("click", function (e) {
          e.stopPropagation();
          menu.classList.toggle("open");
        });

        document.addEventListener("click", function (e) {
          if (!menu.contains(e.target) && !toggle.contains(e.target)) {
            menu.classList.remove("open");
          }
        });
      }
    });
  </script>

</body>
</html>
