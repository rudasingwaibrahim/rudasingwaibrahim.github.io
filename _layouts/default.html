<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}
      {{ page.title }} – {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta name="description" content="{{ site.description }}">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

<header class="hero">
  <div class="hero-overlay">

    <!-- NAV -->
    <nav class="topnav">
      <a class="nav-item" href="{{ '/' | relative_url }}">Accueil</a>

      <!-- MEGA MENU CLASSES -->
      <div class="dropdown mega">
        <a class="nav-item dropdown-toggle" href="#" aria-haspopup="true" aria-expanded="false">
          Classes ▾
        </a>

        <div class="dropdown-menu mega-menu" aria-label="Menu classes">
          {% for group in site.data.classes %}
            <div class="mega-col">
              <div class="dropdown-title">{{ group.level }}</div>
              {% for item in group.items %}
                <a class="dropdown-item" href="{{ item.url | relative_url }}">{{ item.name }}</a>
              {% endfor %}
            </div>
          {% endfor %}
        </div>
      </div>
    </nav>

    <!-- HERO TITLE -->
    <div class="hero-content">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </div>

  </div>
</header>

<main class="container">
  {{ content }}
</main>

<footer class="footer">
  © {{ site.time | date: "%Y" }} — {{ site.title }}
</footer>

<!-- =========================
     SCRIPTS
     ========================= -->

<script>
/* 1) Tous les PDF s'ouvrent dans un nouvel onglet (robuste) */
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll('a[href]').forEach(function (link) {
    const href = (link.getAttribute('href') || '').toLowerCase();

    // couvre: .pdf, .pdf?x=, .pdf#page=...
    const isPdf = href.includes('.pdf');

    if (isPdf) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    }
  });
});
</script>

<script>
/* 2) Mega menu "Classes" : clic + fermeture dehors + Échap */
document.addEventListener("DOMContentLoaded", function () {
  const dropdown = document.querySelector(".dropdown.mega");
  const toggle = dropdown?.querySelector(".dropdown-toggle");
  const menu = dropdown?.querySelector(".dropdown-menu.mega-menu");

  if (!dropdown || !toggle || !menu) return;

  function closeMenu(){
    menu.classList.remove("open");
    toggle.setAttribute("aria-expanded", "false");
  }

  function toggleMenu(){
    const willOpen = !menu.classList.contains("open");
    menu.classList.toggle("open");
    toggle.setAttribute("aria-expanded", willOpen ? "true" : "false");
  }

  toggle.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    toggleMenu();
  });

  // fermer quand on clique sur un lien du menu
  menu.querySelectorAll("a").forEach(function (a) {
    a.addEventListener("click", closeMenu);
  });

  // fermer quand on clique ailleurs
  document.addEventListener("click", function (e) {
    if (!e.target.closest(".dropdown.mega")) closeMenu();
  });

  // fermer avec Échap
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeMenu();
  });
});
</script>

</body>
</html>
