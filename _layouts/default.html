<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>
    {% if page.title %}
      {{ page.title }} – {{ site.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </title>

  <meta name="description" content="{{ site.description }}">

  <!-- CSS (robuste sur toutes les pages) -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>

<header class="hero">
  <div class="hero-overlay">

    <!-- NAV / MENU -->
    <nav class="topnav">
<a class="nav-item" href="{{ '/' | relative_url }}">Accueil</a>
      <!-- MEGA MENU CLASSES (UNIQUE) -->
      <div class="dropdown mega">
        <a class="nav-item dropdown-toggle" href="#" aria-haspopup="true" aria-expanded="false">
          Classes ▾
        </a>

        <div class="dropdown-menu mega-menu" aria-label="Menu classes">
          {% for group in site.data.classes %}
            <div class="mega-col">
              <div class="dropdown-title">{{ group.level }}</div>
              {% for item in group.items %}
                <a class="dropdown-item" href="{{ item.url }}">{{ item.name }}</a>
              {% endfor %}
            </div>
          {% endfor %}
        </div>
      </div>

    </nav>

    <!-- HERO TITLE -->
    <div class="hero-content">
      <h1>{{ site.title }}</h1>
      <p>{{ site.description }}</p>
    </div>

  </div>
</header>

<main class="container">
  {{ content }}
</main>

<footer class="footer">
  © {{ site.time | date: "%Y" }} — {{ site.title }}
</footer>

<!-- =========================
     SCRIPTS (UN SEUL ENDROIT)
     ========================= -->

<script>
/* 1) Tous les PDF s'ouvrent dans un nouvel onglet */
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll('a[href]').forEach(function (link) {
    const href = (link.getAttribute('href') || '').toLowerCase();
    if (href.includes('.pdf')) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    }
  });
});
</script>

<script>
/* 2) Menu "Classes" : clic (mobile/PC) + fermeture au clic ailleurs */
document.addEventListener("DOMContentLoaded", function () {
  const dropdown = document.querySelector(".dropdown.mega");
  const toggle = dropdown?.querySelector(".dropdown-toggle");
  const menu = dropdown?.querySelector(".dropdown-menu");

  if (!dropdown || !toggle || !menu) return;

  toggle.addEventListener("click", function (e) {
    e.preventDefault();
    e.stopPropagation();
    menu.classList.toggle("open");
    toggle.setAttribute("aria-expanded", menu.classList.contains("open") ? "true" : "false");
  });

  /* Fermer le menu quand on clique sur un lien */
  menu.querySelectorAll("a").forEach(function (a) {
    a.addEventListener("click", function () {
      menu.classList.remove("open");
      toggle.setAttribute("aria-expanded", "false");
    });
  });

  /* Fermer le menu quand on clique ailleurs */
  document.addEventListener("click", function (e) {
    if (!e.target.closest(".dropdown.mega")) {
      menu.classList.remove("open");
      toggle.setAttribute("aria-expanded", "false");
    }
  });

  /* Fermer le menu avec la touche Échap */
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      menu.classList.remove("open");
      toggle.setAttribute("aria-expanded", "false");
    }
  });
});
</script>

</body>
</html>
